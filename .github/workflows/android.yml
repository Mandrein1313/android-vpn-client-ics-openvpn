name: Android CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # โปรเจกต์ที่ใช้ Gradle 5.4.1 ต้องใช้ Java 8 เท่านั้น
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # ติดตั้ง Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # สำคัญ: ไม่ต้องอัปเกรด Gradle Wrapper 
      # ให้ใช้ของเดิมที่มากับโปรเจกต์ (5.4.1)
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
